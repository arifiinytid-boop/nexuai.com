name: Deploy NEXUS AI to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject API Keys from GitHub Secrets
        run: |
          echo "Injecting API keys..."
          sed -i "s|%%GEMINI_API_KEY%%|${{ secrets.GEMINI_API_KEY }}|g" index.html
          sed -i "s|%%CLAUDE_API_KEY%%|${{ secrets.CLAUDE_API_KEY }}|g" index.html
          sed -i "s|%%OPENAI_API_KEY%%|${{ secrets.OPENAI_API_KEY }}|g" index.html
          sed -i "s|%%GROK_API_KEY%%|${{ secrets.GROK_API_KEY }}|g" index.html
          echo "Done!"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
