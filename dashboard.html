<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — NEXUS AI</title>
  <link rel="icon" href="nexusai.png">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #030312; --bg2: #06071a; --bg3: #0a0b22;
      --cyan: #00e5ff; --purple: #8800ff; --pink: #ff2d6b;
      --green: #00ffaa; --yellow: #ffd600;
      --text: #b8cfff; --dim: #3a4a7a;
      --b: rgba(0,229,255,.12); --r: 12px;
      --glass: rgba(10,11,34,0.75);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'JetBrains Mono', monospace;
      background: var(--bg); color: var(--text);
      min-height: 100vh; overflow-x: hidden;
      background-image:
        radial-gradient(ellipse at 60% -10%, rgba(136,0,255,0.18), transparent 60%),
        radial-gradient(ellipse at 0% 80%, rgba(0,229,255,0.07), transparent 50%);
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background:
        linear-gradient(rgba(0,229,255,.008) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,.008) 1px, transparent 1px);
      background-size: 40px 40px; pointer-events: none; z-index: 0;
    }

    /* ── NAV ── */
    .nav {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 40px;
      background: rgba(3,3,18,0.85);
      border-bottom: 1px solid var(--b);
      backdrop-filter: blur(18px);
    }
    .nav-logo {
      font-family: 'Orbitron', sans-serif; font-size: 17px; font-weight: 900;
      background: linear-gradient(135deg, var(--cyan), var(--purple));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      text-decoration: none; letter-spacing: 2px;
    }
    .nav-right { display: flex; align-items: center; gap: 14px; }
    .nav-credits {
      display: flex; align-items: center; gap: 6px;
      padding: 4px 12px; border-radius: 20px;
      background: rgba(255,214,0,.06); border: 1px solid rgba(255,214,0,.2);
      font-size: 11px; color: var(--yellow);
    }
    .nav-credits svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2; }
    .user-pill {
      display: flex; align-items: center; gap: 9px;
      cursor: pointer; padding: 5px 12px 5px 5px;
      border-radius: 20px; border: 1px solid var(--b);
      background: var(--bg2); transition: .2s;
    }
    .user-pill:hover { border-color: rgba(0,229,255,.3); background: var(--bg3); }
    .user-av {
      width: 28px; height: 28px; border-radius: 50%;
      border: 1.5px solid var(--cyan); object-fit: cover;
      background: var(--bg3);
    }
    .user-name { font-size: 11px; color: var(--text); }

    /* ── MAIN ── */
    .main { max-width: 1140px; margin: 0 auto; padding: 56px 24px 80px; position: relative; z-index: 1; }

    /* ── HEADER ── */
    .page-header { display: flex; align-items: center; gap: 20px; margin-bottom: 44px; }
    .header-avatar-wrap {
      width: 72px; height: 72px; border-radius: 18px;
      background: var(--bg2); border: 1px solid var(--b);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 28px rgba(0,229,255,.08);
      overflow: hidden; flex-shrink: 0;
    }
    .header-avatar-wrap img { width: 100%; height: 100%; object-fit: cover; }
    .page-header h1 {
      font-family: 'Orbitron', sans-serif; font-size: 28px; font-weight: 900;
      background: linear-gradient(to right, #fff 30%, var(--dim));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 4px;
    }
    .page-header h1 span { -webkit-text-fill-color: var(--cyan); }
    .page-header p { color: var(--dim); font-size: 12px; }

    /* ── CREATE CARD ── */
    .create-card {
      position: relative; overflow: hidden;
      background: var(--glass); border: 1px solid var(--b);
      border-radius: var(--r); padding: 28px 28px 24px;
      margin-bottom: 48px;
      box-shadow: 0 8px 40px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.03);
    }
    .create-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0,229,255,.4), rgba(136,0,255,.3), transparent);
    }
    .create-card-top {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 18px;
    }
    .card-title {
      font-family: 'Orbitron', sans-serif; font-size: 13px; font-weight: 700;
      color: var(--cyan); display: flex; align-items: center; gap: 8px;
    }
    .card-title svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2.5; }
    .limit-badge {
      font-size: 10px; color: var(--dim);
      background: rgba(0,229,255,.05); border: 1px solid var(--b);
      padding: 3px 10px; border-radius: 20px;
    }
    .limit-badge span { color: var(--cyan); font-weight: 700; }
    .input-row { display: flex; gap: 12px; flex-wrap: wrap; }
    .project-input {
      flex: 1; min-width: 260px;
      background: rgba(0,0,0,.35); border: 1px solid var(--b);
      border-radius: 8px; padding: 11px 18px;
      color: #fff; font-family: 'JetBrains Mono', monospace; font-size: 13px;
      outline: none; transition: .25s;
    }
    .project-input:focus { border-color: rgba(0,229,255,.4); box-shadow: 0 0 0 2px rgba(0,229,255,.06); }
    .project-input::placeholder { color: var(--dim); }
    .btn-create {
      background: linear-gradient(135deg, var(--cyan), var(--purple));
      color: #030312; border: none; border-radius: 8px;
      padding: 0 26px; height: 44px;
      font-family: 'Orbitron', sans-serif; font-size: 11px; font-weight: 900;
      cursor: pointer; transition: .25s; letter-spacing: .5px;
      display: flex; align-items: center; gap: 8px;
      position: relative; overflow: hidden;
    }
    .btn-create:hover:not(:disabled) { opacity: .88; transform: translateY(-1px); box-shadow: 0 4px 20px rgba(0,229,255,.25); }
    .btn-create:disabled { opacity: .4; cursor: not-allowed; filter: grayscale(.6); }
    .btn-create .btn-spinner {
      display: none; width: 14px; height: 14px;
      border: 2px solid rgba(3,3,18,.3); border-top-color: #030312;
      border-radius: 50%; animation: spin .7s linear infinite;
    }
    .btn-create.loading .btn-spinner { display: block; }
    .btn-create.loading .btn-text { opacity: 0; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── SECTION LABEL ── */
    .section-header {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 22px;
    }
    .section-header h2 {
      font-family: 'Orbitron', sans-serif; font-size: 12px;
      color: var(--dim); text-transform: uppercase; letter-spacing: 2px;
    }
    .section-header .line { flex: 1; height: 1px; background: var(--b); }

    /* ── PROJECTS GRID ── */
    .projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 20px; }

    .project-card {
      background: var(--bg2); border: 1px solid var(--b);
      border-radius: var(--r); padding: 22px 22px 18px;
      transition: .25s; cursor: pointer; position: relative; overflow: hidden;
    }
    .project-card::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(0,229,255,.03), transparent);
      opacity: 0; transition: .25s;
    }
    .project-card:hover { transform: translateY(-4px); border-color: rgba(0,229,255,.3); }
    .project-card:hover::after { opacity: 1; }

    .project-card-top {
      display: flex; align-items: flex-start; justify-content: space-between;
      margin-bottom: 14px;
    }
    .project-icon {
      width: 36px; height: 36px; border-radius: 8px;
      background: linear-gradient(135deg, rgba(0,229,255,.1), rgba(136,0,255,.1));
      border: 1px solid var(--b); display: flex; align-items: center; justify-content: center;
    }
    .project-icon svg { width: 18px; height: 18px; stroke: var(--cyan); fill: none; stroke-width: 1.8; }
    .project-id-tag {
      font-size: 9px; color: var(--dim);
      background: rgba(0,0,0,.3); padding: 2px 7px;
      border-radius: 4px; border: 1px solid var(--b);
      font-family: 'JetBrains Mono', monospace;
    }
    .project-name {
      font-family: 'Orbitron', sans-serif; font-size: 15px;
      font-weight: 700; color: #fff; margin-bottom: 6px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .project-meta {
      display: flex; align-items: center; justify-content: space-between;
      padding-top: 14px; margin-top: 14px;
      border-top: 1px solid rgba(255,255,255,.04);
    }
    .meta-date { font-size: 10px; color: var(--dim); }
    .meta-status {
      font-size: 9px; color: var(--green);
      background: rgba(0,255,170,.07); border: 1px solid rgba(0,255,170,.2);
      padding: 2px 8px; border-radius: 10px;
      display: flex; align-items: center; gap: 4px;
    }
    .meta-status::before {
      content: ''; width: 5px; height: 5px; border-radius: 50%;
      background: var(--green); animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }

    .btn-del {
      position: absolute; bottom: 18px; right: 18px;
      width: 28px; height: 28px; border-radius: 6px;
      background: rgba(255,45,107,.08); border: 1px solid rgba(255,45,107,.2);
      color: var(--pink); display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: .18s; z-index: 5;
    }
    .btn-del:hover { background: var(--pink); color: #fff; border-color: var(--pink); }
    .btn-del svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 2; }

    /* ── EMPTY STATE ── */
    .empty-state {
      grid-column: 1/-1; text-align: center;
      padding: 80px 20px; color: var(--dim);
    }
    .empty-icon {
      width: 56px; height: 56px; border-radius: 14px;
      background: var(--bg2); border: 1px solid var(--b);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px;
    }
    .empty-icon svg { width: 24px; height: 24px; stroke: var(--dim); fill: none; stroke-width: 1.5; }
    .empty-state p { font-size: 12px; line-height: 1.7; }
    .empty-state strong { color: var(--text); display: block; margin-bottom: 4px; font-size: 14px; }

    /* ── LOADER ── */
    #loader {
      position: fixed; inset: 0; background: var(--bg); z-index: 999;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px;
    }
    #loader .logo-text {
      font-family: 'Orbitron', sans-serif; font-size: 22px; font-weight: 900;
      background: linear-gradient(135deg, var(--cyan), var(--purple));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(0,229,255,.1);
      border-top-color: var(--cyan);
      border-radius: 50%; animation: spin 1s linear infinite;
    }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 24px; right: 24px; z-index: 9999;
      padding: 10px 18px; border-radius: 8px;
      font-size: 12px; font-family: 'JetBrains Mono', monospace;
      background: var(--bg3); border: 1px solid var(--b);
      animation: toastIn .2s ease; pointer-events: none;
    }
    @keyframes toastIn { from{opacity:0;transform:translateX(10px)} to{opacity:1;transform:none} }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      .nav { padding: 12px 16px; }
      .main { padding: 32px 14px 60px; }
      .page-header h1 { font-size: 20px; }
      .btn-create { width: 100%; justify-content: center; }
      .project-input { min-width: 100%; }
    }
  </style>
</head>
<body>

<div id="loader">
  <div class="logo-text">NEXUS AI</div>
  <div class="spinner"></div>
</div>

<nav class="nav">
  <a href="/dashboard" class="nav-logo">NEXUS AI</a>
  <div class="nav-right">
    <div class="nav-credits" id="navCredits">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      <span id="navCreditsVal">–</span> CR
    </div>
    <div class="user-pill" onclick="goToChats()">
      <img id="userAv" class="user-av" src="nexusai.png" alt="">
      <span id="userName" class="user-name">@...</span>
    </div>
  </div>
</nav>

<div class="main">
  <!-- Header -->
  <div class="page-header">
    <div class="header-avatar-wrap">
      <img id="headerAv" src="nexusai.png" alt="" onerror="this.src='nexusai.png'">
    </div>
    <div>
      <h1>Welcome, <span id="welcomeName">Dev</span></h1>
      <p>NEXUS AI Project Hub — Create and manage your Roblox AI sessions</p>
    </div>
  </div>

  <!-- Create -->
  <div class="create-card">
    <div class="create-card-top">
      <div class="card-title">
        <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New Project
      </div>
      <div class="limit-badge">
        <span id="projectCount">0</span> / <span id="projectLimit">3</span> projects
      </div>
    </div>
    <div class="input-row">
      <input
        type="text" id="projectName" class="project-input"
        placeholder="Project name — e.g. Obby Game, Shop System"
        maxlength="60"
        onkeydown="if(event.key==='Enter') createProject()"
      >
      <button id="btnCreate" class="btn-create" onclick="createProject()">
        <div class="btn-spinner"></div>
        <span class="btn-text">CREATE PROJECT</span>
        <svg class="btn-text" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>
  </div>

  <!-- Projects -->
  <div class="section-header">
    <h2>Your Projects</h2>
    <div class="line"></div>
  </div>
  <div id="projectsGrid" class="projects-grid"></div>
</div>

<script>
'use strict';

let SESSION = null;
let USER_DATA = null;

// ─── UNIQUE ID ──────────────────────────────────────────────────────────────
// Generates a collision-resistant project ID using crypto if available.
// Format: nxs_<8 random hex chars>_<timestamp base36>
function generateProjectId() {
  let rand = '';
  try {
    const arr = new Uint8Array(10);
    crypto.getRandomValues(arr);
    rand = Array.from(arr).map(b => b.toString(16).padStart(2,'0')).join('');
  } catch (_) {
    const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
    for (let i = 0; i < 20; i++) rand += chars[Math.floor(Math.random() * chars.length)];
  }
  const ts = Date.now().toString(36); // base36 timestamp
  return 'nxs_' + rand + '_' + ts;   // e.g. nxs_3f8a2b...c1_lxyz123
}

// ─── AUTH ───────────────────────────────────────────────────────────────────
async function init() {
  const raw = localStorage.getItem('nexus_session');
  if (!raw) { location.replace('/login'); return; }

  try {
    SESSION = JSON.parse(raw);
    if (!SESSION?.user?.username || !SESSION?.user?.robloxId) throw new Error();
    if (Date.now() - SESSION.loginTime > 86400000 * 7) throw new Error('expired');
  } catch (_) {
    localStorage.removeItem('nexus_session');
    location.replace('/login');
    return;
  }

  const u = SESSION.user;
  document.getElementById('userName').textContent = '@' + u.username;
  document.getElementById('welcomeName').textContent = u.username;

  const avSrc = u.avatar
    || (u.robloxId ? `https://www.roblox.com/headshot-thumbnail/image?userId=${u.robloxId}&width=150&height=150&format=png` : 'nexusai.png');
  document.getElementById('userAv').src = avSrc;
  document.getElementById('headerAv').src = avSrc;

  // Always pull fresh data from server (persistent across devices)
  await syncFromServer();

  document.getElementById('loader').style.display = 'none';
  renderProjects();
  renderCredits();
}

// ─── SERVER SYNC ────────────────────────────────────────────────────────────
async function syncFromServer() {
  try {
    const username = (SESSION.user.username || '').toLowerCase();
    const r = await fetch(`/api/sync?user=${encodeURIComponent(username)}`);
    if (r.ok) {
      const d = await r.json();
      if (d) {
        USER_DATA = d;
        if (!USER_DATA.projects) USER_DATA.projects = [];
        // Merge server data into session
        SESSION.data = Object.assign(SESSION.data || {}, d);
        try { localStorage.setItem('nexus_session', JSON.stringify(SESSION)); } catch(_) {}
        return;
      }
    }
  } catch (_) {}

  // Fallback to local session data
  USER_DATA = SESSION.data || {};
  if (!USER_DATA.projects) USER_DATA.projects = [];
}

async function saveToServer() {
  if (!SESSION) return;
  const username = (SESSION.user.username || '').toLowerCase();
  SESSION.data = Object.assign(SESSION.data || {}, USER_DATA);
  try { localStorage.setItem('nexus_session', JSON.stringify(SESSION)); } catch(_) {}
  try {
    await fetch('/api/sync', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user: username, data: USER_DATA })
    });
  } catch (_) {}
}

// ─── RENDER ─────────────────────────────────────────────────────────────────
function renderCredits() {
  const credits = USER_DATA.credits ?? SESSION?.data?.credits ?? 30;
  const plan = (USER_DATA.plan || 'free').toLowerCase();
  const isUnlimited = plan === 'owner' || plan === 'unlimited' ||
    (SESSION?.data?.roles || []).includes('owner');
  document.getElementById('navCreditsVal').textContent = isUnlimited ? '∞' : parseFloat(credits).toFixed(0);
}

function renderProjects() {
  const projects = USER_DATA.projects || [];
  const plan = (USER_DATA.plan || 'free').toLowerCase();
  const limit = plan === 'pro' ? 10 : 3;

  document.getElementById('projectCount').textContent = projects.length;
  document.getElementById('projectLimit').textContent = limit;
  document.getElementById('btnCreate').disabled = projects.length >= limit;

  const grid = document.getElementById('projectsGrid');

  if (!projects.length) {
    grid.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">
          <svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        </div>
        <p>
          <strong>No projects yet</strong>
          Create your first project to start chatting with NEXUS AI
        </p>
      </div>`;
    return;
  }

  grid.innerHTML = projects.map(p => `
    <div class="project-card" onclick="openProject('${esc(p.id)}')">
      <div class="project-card-top">
        <div class="project-icon">
          <svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        </div>
        <span class="project-id-tag">${esc(p.id.slice(0, 16))}…</span>
      </div>
      <div class="project-name">${esc(p.name)}</div>
      <div class="project-meta">
        <span class="meta-date">${new Date(p.createdAt).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</span>
        <span class="meta-status">Active</span>
      </div>
      <button class="btn-del" onclick="deleteProject(event,'${esc(p.id)}')" title="Delete project">
        <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
      </button>
    </div>
  `).join('');
}

// ─── CREATE PROJECT ──────────────────────────────────────────────────────────
async function createProject() {
  const nameInput = document.getElementById('projectName');
  const name = nameInput.value.trim();
  if (!name) { nameInput.focus(); toast('Enter a project name', 'var(--yellow)'); return; }

  const plan = (USER_DATA.plan || 'free').toLowerCase();
  const limit = plan === 'pro' ? 10 : 3;
  if ((USER_DATA.projects || []).length >= limit) {
    toast(`Limit reached — ${plan === 'pro' ? 'Pro' : 'Free'} plan: ${limit} projects max`, 'var(--pink)');
    return;
  }

  const btn = document.getElementById('btnCreate');
  btn.disabled = true;
  btn.classList.add('loading');

  const pid = generateProjectId();
  const newProject = { id: pid, name, createdAt: new Date().toISOString() };

  if (!USER_DATA.projects) USER_DATA.projects = [];
  USER_DATA.projects.unshift(newProject);

  try {
    await saveToServer();
    // ✅ Full navigation to /chats/{id} — Vercel rewrites this to chats.html?id={id}
    window.location.href = '/chats/' + pid;
  } catch (e) {
    // Rollback optimistic update
    USER_DATA.projects = USER_DATA.projects.filter(p => p.id !== pid);
    btn.disabled = false;
    btn.classList.remove('loading');
    toast('Failed to save project. Try again.', 'var(--pink)');
  }
}

// ─── DELETE PROJECT ──────────────────────────────────────────────────────────
async function deleteProject(e, id) {
  e.stopPropagation();
  if (!confirm('Delete this project? Chat history will be hidden but not permanently deleted.')) return;

  USER_DATA.projects = (USER_DATA.projects || []).filter(p => p.id !== id);
  renderProjects();
  saveToServer(); // fire and forget
  toast('Project deleted', 'var(--dim)');
}

// ─── OPEN PROJECT ────────────────────────────────────────────────────────────
function openProject(id) {
  window.location.href = '/chats/' + id;
}

function goToChats() {
  window.location.href = '/chats';
}

// ─── UTILS ───────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toast(msg, color = 'var(--cyan)', dur = 2800) {
  document.querySelectorAll('.toast').forEach(t => t.remove());
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  t.style.color = color;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), dur);
}
