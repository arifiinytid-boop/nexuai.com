<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NEXUS Agent — Support AI</title>
<link rel="icon" href="nexusai.png" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/lua.min.js"></script>
<style>
:root{
  --bg:#030312;--bg2:#06071a;--bg3:#0a0b22;
  --card:rgba(0,229,255,.04);--hover:rgba(0,229,255,.07);
  --cyan:#00e5ff;--cyan2:rgba(0,229,255,.35);--cyan3:rgba(0,229,255,.12);
  --purple:#8800ff;--pink:#ff2d6b;--green:#00ffaa;--yellow:#ffd600;
  --orange:#ff9500;
  --text:#b8cfff;--dim:#3a4a7a;
  --b:rgba(0,229,255,.12);--bb:rgba(0,229,255,.3);
  --gc:0 0 20px rgba(0,229,255,.15);
  --agent-accent:#ff9500;--agent-accent2:rgba(255,149,0,.2);
  --r:8px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;font-family:'JetBrains Mono',monospace;background:var(--bg);color:var(--text);font-size:13px;overflow:hidden;}
body::before{content:'';position:fixed;inset:0;background:linear-gradient(rgba(255,149,0,.008)1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,.008)1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
#app{display:flex;flex-direction:column;height:100vh;position:relative;z-index:1;}

/* ─── TOP BAR ─── */
.top-bar{display:flex;align-items:center;gap:10px;padding:8px 16px;background:var(--bg2);border-bottom:1px solid var(--b);flex-shrink:0;}
.top-logo{display:flex;align-items:center;gap:8px;}
.top-logo img{width:28px;height:28px;border-radius:7px;object-fit:cover;}
.top-logo-text{font-family:'Orbitron',sans-serif;font-weight:900;font-size:11px;background:linear-gradient(135deg,var(--orange),var(--yellow));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.top-logo-sub{font-size:8px;color:var(--dim);}
.top-sep{width:1px;height:24px;background:var(--b);flex-shrink:0;}
.top-title{font-size:10px;color:var(--text);flex:1;}
.top-title span{color:var(--orange);}
.status-badge{display:flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;border:1px solid;font-size:9px;cursor:pointer;flex-shrink:0;transition:.2s;}
.status-badge.off{border-color:rgba(255,45,107,.3);color:var(--pink);background:rgba(255,45,107,.06);}
.status-badge.on{border-color:rgba(0,255,170,.3);color:var(--green);background:rgba(0,255,170,.06);}
.sdot{width:5px;height:5px;border-radius:50%;background:currentColor;}
.sdot.pulse{animation:pd 1.8s infinite;}
@keyframes pd{0%,100%{opacity:1}50%{opacity:.25}}
.top-nav-btn{display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:6px;border:1px solid var(--b);background:transparent;color:var(--dim);font-size:10px;cursor:pointer;transition:.15s;font-family:'JetBrains Mono',monospace;}
.top-nav-btn:hover{color:var(--cyan);border-color:var(--cyan2);}
.top-nav-btn svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2;}

/* ─── PLUGIN BANNER ─── */
.plug-banner{padding:5px 14px;background:rgba(255,45,107,.08);border-bottom:1px solid rgba(255,45,107,.2);font-size:10px;color:var(--pink);display:flex;align-items:center;gap:7px;flex-shrink:0;}
.plug-banner svg{width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2;flex-shrink:0;}
.plug-banner a{color:var(--cyan);cursor:pointer;text-decoration:none;}
.plug-banner.connected{background:rgba(0,255,170,.05);border-color:rgba(0,255,170,.2);color:var(--green);}

/* ─── MSGS ─── */
#msgs{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:12px;}
#msgs::-webkit-scrollbar{width:3px;}
#msgs::-webkit-scrollbar-thumb{background:var(--b);}

/* ─── MSG BUBBLES ─── */
.msg{display:flex;gap:10px;animation:mi .25s ease;}
.msg.user{flex-direction:row-reverse;}
@keyframes mi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.av{width:32px;height:32px;border-radius:50%;flex-shrink:0;overflow:hidden;background:var(--bg3);}
.av img{width:100%;height:100%;object-fit:cover;}
.av.agent-av{background:linear-gradient(135deg,rgba(255,149,0,.2),rgba(255,214,0,.2));border:1.5px solid rgba(255,149,0,.4);display:flex;align-items:center;justify-content:center;font-size:13px;}
.mb-wrap{max-width:82%;display:flex;flex-direction:column;gap:3px;min-width:0;}
.msg-sender{font-size:9px;color:var(--dim);display:flex;align-items:center;gap:5px;padding:0 3px;}
.msg.user .msg-sender{flex-direction:row-reverse;}
.bubble{padding:11px 14px;border-radius:10px;line-height:1.72;font-size:12.5px;word-break:break-word;}
.msg.user .bubble{background:linear-gradient(135deg,rgba(255,149,0,.08),rgba(255,214,0,.06));border:1px solid rgba(255,149,0,.2);border-radius:10px 2px 10px 10px;color:white;}
.msg.agent .bubble{background:var(--bg2);border:1px solid var(--b);border-radius:2px 10px 10px 10px;color:var(--text);}

/* Welcome message special style */
.msg.agent.welcome-msg .bubble{background:linear-gradient(135deg,rgba(255,149,0,.06),rgba(136,0,255,.04));border:1px solid rgba(255,149,0,.2);}

/* ─── TYPING INDICATOR ─── */
.typing-wrap{display:flex;gap:10px;animation:mi .25s ease;}
.typing-box{background:var(--bg2);border:1px solid var(--b);border-radius:2px 10px 10px 10px;padding:12px 16px;display:flex;align-items:center;gap:10px;}
.typing-dots{display:flex;gap:4px;align-items:center;}
.typing-dot{width:6px;height:6px;border-radius:50%;background:var(--orange);animation:tdot 1.2s ease-in-out infinite;}
.typing-dot:nth-child(2){animation-delay:.2s;}
.typing-dot:nth-child(3){animation-delay:.4s;}
@keyframes tdot{0%,80%,100%{transform:scale(.8);opacity:.4}40%{transform:scale(1.2);opacity:1}}
.typing-label{font-size:10px;color:var(--dim);}
.tspin{width:12px;height:12px;border:2px solid rgba(255,149,0,.2);border-top-color:var(--orange);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg)}}
.cancel-typing-btn{padding:3px 10px;background:rgba(255,45,107,.1);border:1px solid rgba(255,45,107,.3);border-radius:5px;color:var(--pink);font-size:9px;cursor:pointer;transition:.1s;}
.cancel-typing-btn:hover{background:rgba(255,45,107,.18);}

/* ─── STUDIO INJECT CARD ─── */
.studio-inject-card{background:rgba(0,255,170,.05);border:1px solid rgba(0,255,170,.2);border-radius:8px;padding:10px 13px;margin:6px 0;font-size:11px;}
.sc-title{color:var(--green);font-weight:700;font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:1px;margin-bottom:5px;display:flex;align-items:center;gap:6px;}
.sc-title svg{width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2;}
.sc-item{color:var(--text);padding:2px 0;display:flex;align-items:center;gap:6px;font-size:10.5px;}
.sc-item::before{content:"✓";color:var(--green);font-weight:700;}

/* ─── QUICK ACTIONS ─── */
.quick-actions{display:flex;gap:7px;flex-wrap:wrap;padding:10px 20px 0;flex-shrink:0;}
.qa-btn{padding:6px 12px;background:var(--card);border:1px solid var(--b);border-radius:20px;font-size:10px;color:var(--dim);cursor:pointer;transition:.15s;white-space:nowrap;}
.qa-btn:hover{border-color:rgba(255,149,0,.4);color:var(--orange);background:rgba(255,149,0,.06);}
.quick-actions:empty{display:none;}

/* ─── INPUT ─── */
.inp-area{padding:10px 16px 12px;border-top:1px solid var(--b);background:var(--bg2);flex-shrink:0;}
.inp-box{background:var(--bg3);border:1px solid var(--b);border-radius:12px;transition:.2s;overflow:hidden;}
.inp-box:focus-within{border-color:rgba(255,149,0,.4);box-shadow:0 0 0 2px rgba(255,149,0,.05);}
#inp{width:100%;background:transparent;border:none;outline:none;color:white;font-family:'JetBrains Mono',monospace;font-size:13px;padding:11px 14px;resize:none;min-height:44px;max-height:130px;line-height:1.55;}
#inp::placeholder{color:var(--dim);}
.inp-bar{display:flex;align-items:center;padding:5px 9px;border-top:1px solid var(--b);gap:5px;}
.inp-l{display:flex;align-items:center;gap:5px;flex:1;}
.inp-model{display:flex;align-items:center;gap:5px;padding:3px 9px;border-radius:6px;background:var(--card);border:1px solid var(--b);cursor:pointer;transition:.12s;font-size:9.5px;color:var(--dim);max-width:175px;overflow:hidden;flex-shrink:0;}
.inp-model:hover{border-color:rgba(255,149,0,.4);color:var(--orange);}
.inp-model img{width:14px;height:14px;border-radius:3px;object-fit:contain;flex-shrink:0;}
.inp-model-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;font-size:9px;}
.inp-model-badge{font-size:8px;font-weight:700;flex-shrink:0;}
.model-dd{position:fixed;background:var(--bg3);border:1px solid var(--b);border-radius:var(--r);z-index:9000;display:none;max-height:360px;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.9);min-width:260px;}
.model-dd.open{display:block;}
.model-dd::-webkit-scrollbar{width:3px;}
.model-dd::-webkit-scrollbar-thumb{background:var(--b);}
.mg{padding:6px 11px 3px;font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:2px;border-top:1px solid var(--b);}
.mg:first-child{border-top:none;}
.mo{padding:7px 11px;display:flex;align-items:center;gap:7px;cursor:pointer;transition:.1s;}
.mo:hover:not(.disabled){background:var(--hover);}
.mo.act{background:rgba(255,149,0,.06);}
.mo.disabled{opacity:.35;cursor:not-allowed;}
.mo-icon{width:20px;height:20px;border-radius:4px;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.mo-icon img{width:100%;height:100%;object-fit:contain;}
.mo-n{font-size:11px;color:white;flex:1;}
.mo-s{font-size:9px;color:var(--dim);}
.mb{font-size:8px;padding:1px 5px;border-radius:3px;font-weight:700;white-space:nowrap;}
.mb.f{background:rgba(0,255,170,.12);color:var(--green);}
.mb.s{background:rgba(0,229,255,.12);color:var(--cyan);}
.mb.p{background:rgba(136,0,255,.15);color:#cc55ff;}
.btn-send,.btn-cancel{border:none;border-radius:8px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.18s;flex-shrink:0;}
.btn-send{background:linear-gradient(135deg,var(--orange),var(--yellow));color:#030312;}
.btn-send:hover{opacity:.82;transform:scale(1.05);}
.btn-send svg,.btn-cancel svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;}
.btn-cancel{background:rgba(255,45,107,.15);border:1px solid rgba(255,45,107,.3);color:var(--pink);}
.ib{width:27px;height:27px;border-radius:5px;border:1px solid var(--b);background:transparent;color:var(--dim);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.12s;flex-shrink:0;}
.ib:hover{color:var(--orange);border-color:rgba(255,149,0,.4);}
.ib svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.5;}

/* ─── MSG ACTIONS ─── */
.msg-acts{display:flex;gap:3px;padding:3px 2px;flex-wrap:wrap;align-items:center;}
.mab{font-size:9px;color:var(--dim);background:none;border:1px solid transparent;cursor:pointer;padding:3px 6px;border-radius:4px;transition:.12s;display:flex;align-items:center;gap:3px;}
.mab:hover{color:var(--orange);border-color:rgba(255,149,0,.3);background:rgba(255,149,0,.06);}
.mab svg{width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2;}

/* ─── CODE BLOCKS ─── */
.code-block-wrap{position:relative;margin:8px 0;}
.code-block-wrap pre{margin:0;border-radius:7px;overflow:hidden;}
.code-block-wrap pre code.hljs{font-size:11px;line-height:1.55;padding:12px 14px;border-radius:7px;border:1px solid rgba(0,229,255,.1);}
.code-btns{position:absolute;top:6px;right:7px;display:flex;gap:4px;opacity:0;transition:.15s;z-index:2;}
.code-block-wrap:hover .code-btns{opacity:1;}
.cbtn{background:rgba(10,11,34,.9);border:1px solid rgba(0,229,255,.25);border-radius:5px;color:var(--cyan);font-size:9px;padding:3px 8px;cursor:pointer;display:flex;align-items:center;gap:3px;transition:.12s;}
.cbtn:hover{background:rgba(0,229,255,.15);}
.cbtn svg{width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2;}
.bubble code:not(.hljs){background:rgba(255,149,0,.08);padding:2px 5px;border-radius:3px;font-size:11px;color:var(--orange);}
.bubble p{margin-bottom:6px;}.bubble p:last-child{margin-bottom:0;}
.bubble h1,.bubble h2,.bubble h3{color:var(--orange);margin:10px 0 5px;font-family:'Orbitron',sans-serif;}
.bubble h1{font-size:14px;}.bubble h2{font-size:13px;}.bubble h3{font-size:12px;}
.bubble ul,.bubble ol{padding-left:18px;margin-bottom:6px;}
.bubble li{margin-bottom:3px;line-height:1.65;}
.bubble strong{color:white;}
.bubble table{width:100%;border-collapse:collapse;margin:7px 0;font-size:11px;}
.bubble th,.bubble td{padding:5px 9px;border:1px solid var(--b);}
.bubble th{background:rgba(255,149,0,.06);color:var(--orange);}
.bubble blockquote{border-left:3px solid rgba(255,149,0,.4);padding:6px 12px;margin:6px 0;background:rgba(255,149,0,.04);border-radius:0 6px 6px 0;}

/* ─── ATTACH ─── */
.attach-row{display:flex;gap:7px;margin-bottom:7px;flex-wrap:wrap;}
.attach-row:empty{display:none;}
.attach-item{position:relative;}
.attach-item img{width:54px;height:54px;border-radius:5px;object-fit:cover;border:1px solid var(--b);}
.attach-file{padding:5px 9px;border:1px solid var(--b);border-radius:5px;font-size:10px;color:var(--orange);background:rgba(255,149,0,.04);display:flex;align-items:center;gap:5px;}
.attach-rm{position:absolute;top:-5px;right:-5px;width:16px;height:16px;background:var(--pink);border:none;border-radius:50%;color:white;font-size:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;}

/* ─── TOAST ─── */
@keyframes toastIn{from{opacity:0;transform:translateX(12px)}to{opacity:1;transform:none}}
.hidden{display:none!important;}
::-webkit-scrollbar{width:2px;height:2px;}
::-webkit-scrollbar-thumb{background:var(--b);border-radius:2px;}

/* ─── MOBILE ─── */
@media(max-width:768px){
  #msgs{padding:8px 10px;gap:8px;}
  .mb-wrap{max-width:92%;}
  .bubble{font-size:12px;padding:8px 10px;}
  .inp-area{padding:6px 8px;}
  #inp{font-size:12px;padding:8px 10px;min-height:38px;}
  .inp-model{max-width:120px;}
  .quick-actions{padding:6px 10px 0;}
}
</style>
</head>
<body>
<div id="app" class="hidden">

  <!-- TOP BAR -->
  <div class="top-bar">
    <div class="top-logo">
      <img src="nexusai.png" alt="NEXUS" onerror="this.style.opacity='.4'">
      <div>
        <div class="top-logo-text">NEXUS AGENT</div>
        <div class="top-logo-sub">AI Support Assistant</div>
      </div>
    </div>
    <div class="top-sep"></div>
    <div class="top-title" id="agentStatusText"><span id="greetUser">Hello!</span> — <span id="agentModeLabel">Support Mode</span></div>
    <div class="status-badge off" id="studioBadge" onclick="retryStudio()">
      <div class="sdot pulse" id="studioDot"></div>
      <span id="studioTxt">Studio: OFF</span>
    </div>
    <button class="top-nav-btn" onclick="window.location.href='/chats'">
      <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
      <span id="backToNexusBtn">Back to NEXUS AI</span>
    </button>
  </div>

  <!-- PLUGIN BANNER -->
  <div class="plug-banner" id="plugBanner">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    <span id="plugBannerTxt">Plugin not connected —</span>
    <a href="/chats" style="color:var(--cyan);">Connect via NEXUS AI →</a>
  </div>

  <!-- MESSAGES -->
  <div id="msgs"></div>

  <!-- QUICK ACTIONS -->
  <div class="quick-actions" id="quickActions"></div>

  <!-- INPUT -->
  <div class="inp-area">
    <div class="attach-row" id="attachRow"></div>
    <div class="inp-box">
      <textarea id="inp" placeholder="Ask me anything about Roblox development..." rows="1"></textarea>
      <div class="inp-bar">
        <div class="inp-l">
          <label for="fi" class="ib" title="Attach file">
            <svg viewBox="0 0 24 24"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
          </label>
          <input type="file" id="fi" accept="image/*,.lua,.txt,.json" style="display:none" onchange="handleFile(event)" multiple>
          <button class="ib" onclick="clearConv()" title="Clear conversation">
            <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
          </button>
          <div class="inp-model" id="inpModelBtn" onclick="toggleMDD(event)">
            <img id="inpMIcon" src="" alt="" onerror="this.style.display='none'" style="width:14px;height:14px;border-radius:3px;">
            <span class="inp-model-name" id="inpMName">Gemini 2.5 Flash</span>
            <span class="inp-model-badge" id="inpMBadge" style="color:var(--green);">FREE</span>
            <svg width="8" height="8" viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2" style="color:var(--dim);flex-shrink:0;"><polyline points="6 9 12 15 18 9"/></svg>
          </div>
        </div>
        <button class="btn-cancel hidden" id="cancelBtn" onclick="cancelGen()">
          <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
        <button class="btn-send" id="sendBtn" onclick="send()">
          <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
    <div class="model-dd" id="mDD"></div>
  </div>
</div>

<script>
'use strict';

// ─── STATE ─────────────────────────────────────────────────────────────────
var SESSION = null;
var studioConnected = false;
var studioPollTimer = null;
var API_URL = '/api/control';
var curLang = localStorage.getItem('nexus_lang') || 'id';
var convMsgs = [];
var isGen = false;
var cancelCtrl = null;
var attachments = [];
var curModel = {id:'gemini-2.5-flash-lite',prov:'gemini',cost:0,label:'Gemini 2.5 Flash Lite',icon:'/icon/gemini.png'};

// ─── MODEL LIST ─────────────────────────────────────────────────────────────
var MODEL_LIST = [
  {grp:'⚡ Google Gemini Fast'},
  {id:'gemini-2.5-flash-lite',prov:'gemini',cost:0,label:'Gemini 2.5 Flash Lite',icon:'/icon/gemini.png',badge:'FREE'},
  {id:'gemini-2.0-flash',prov:'gemini',cost:0,label:'Gemini 2.0 Flash',icon:'/icon/gemini.png',badge:'FREE'},
  {grp:'🧠 Google Gemini Smart'},
  {id:'gemini-2.5-flash',prov:'gemini',cost:1,label:'Gemini 2.5 Flash',icon:'/icon/gemini.png',badge:'SMART'},
  {id:'gemini-2.5-pro-preview',prov:'gemini',cost:3,label:'Gemini 2.5 Pro',icon:'/icon/gemini.png',badge:'BEST'},
  {grp:'🦙 Groq — Fast & Free'},
  {id:'llama-3.1-8b-instant',prov:'groq',cost:0,label:'Llama 3.1 8B Instant',icon:'/icon/groq.ico',badge:'FREE'},
  {id:'llama-3.3-70b-versatile',prov:'groq',cost:0,label:'Llama 3.3 70B',icon:'/icon/groq.ico',badge:'FREE'},
  {grp:'🌫️ Mistral'},
  {id:'mistral-small-latest',prov:'mistral',cost:0,label:'Mistral Small',icon:'/icon/mistral.png',badge:'FREE'},
];

// ─── LANGS ──────────────────────────────────────────────────────────────────

// ─── AUTH ────────────────────────────────────────────────────────────────────
(function(){
  try{
    var s=localStorage.getItem('nexus_session');
    if(!s){window.location.replace('/login');return;}
    var p=JSON.parse(s);
    if(!p||!p.user||!p.user.username){localStorage.removeItem('nexus_session');window.location.replace('/login');return;}
    if((Date.now()-p.loginTime)>=86400000*7){localStorage.removeItem('nexus_session');window.location.replace('/login');return;}
    SESSION=p;
    document.getElementById('app').classList.remove('hidden');
  }catch(e){localStorage.removeItem('nexus_session');window.location.replace('/login');}
})();

// ─── UTILS ──────────────────────────────────────────────────────────────────
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toast(msg,col,dur){
  document.querySelectorAll('.nx-toast').forEach(function(x){x.remove();});
  var t=document.createElement('div');t.className='nx-toast';
  t.textContent=msg;
  t.style.cssText='position:fixed;bottom:22px;right:22px;background:var(--bg3);border:1px solid var(--b);border-radius:8px;padding:9px 15px;font-size:11px;z-index:9999;color:'+(col||'var(--orange)')+';animation:toastIn .2s ease;pointer-events:none;';
  document.body.appendChild(t);setTimeout(function(){t.remove();},(dur||2800));
}
function safeMarked(md){
  try{if(typeof marked==='undefined')return esc(md);return marked.parse(String(md||''));}
  catch(e){return esc(md);}
}

// ─── STUDIO ─────────────────────────────────────────────────────────────────
function setStudioStatus(on){
  studioConnected=on;
  var t=T();
  var badge=document.getElementById('studioBadge');
  var dot=document.getElementById('studioDot');
  var txt=document.getElementById('studioTxt');
  var banner=document.getElementById('plugBanner');
  var bannerTxt=document.getElementById('plugBannerTxt');
  if(on){
    if(badge)badge.className='status-badge on';
    if(dot)dot.className='sdot pulse';
    if(txt)txt.textContent=t.studioOn;
    if(banner)banner.className='plug-banner connected';
    if(bannerTxt)bannerTxt.textContent=t.connected;
  }else{
    if(badge)badge.className='status-badge off';
    if(dot)dot.className='sdot pulse';
    if(txt)txt.textContent=t.studioOff;
    if(banner)banner.className='plug-banner';
    if(bannerTxt)bannerTxt.textContent=t.disconnected;
  }
}
async function checkStudio(){
  if(!SESSION)return;
  var username=(SESSION.user.username||'').toLowerCase();
  try{
    var r=await fetch(API_URL+'?check=1&user='+encodeURIComponent(username),{signal:AbortSignal.timeout(5000)});
    if(r.ok){var d=await r.json();setStudioStatus(d._pluginConnected===true||d.connected===true||d.online===true);}
    else setStudioStatus(false);
  }catch(e){setStudioStatus(false);}
}
async function retryStudio(){toast('Reconnecting...');await checkStudio();}
function startStudioPoll(){
  if(studioPollTimer)clearInterval(studioPollTimer);
  checkStudio();
  studioPollTimer=setInterval(checkStudio,5000);
}

// ─── RENDER MSG ──────────────────────────────────────────────────────────────
function appendMsg(m,skipScroll,extraClass){
  var container=document.getElementById('msgs');if(!container)return;
  var isUser=m.role==='user';
  var wrap=document.createElement('div');
  wrap.className='msg '+(isUser?'user':'agent')+(extraClass?' '+extraClass:'');
  wrap.appendChild(mkAv(m.role));
  var mbWrap=document.createElement('div');mbWrap.className='mb-wrap';
  var sender=document.createElement('div');sender.className='msg-sender';
  var t=new Date(m.time||Date.now());
  sender.innerHTML='<span>'+(isUser?'@'+(SESSION&&SESSION.user.username||'You'):'NEXUS Agent')+'</span><span>'+t.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})+'</span>';
  mbWrap.appendChild(sender);
  var bubble=document.createElement('div');bubble.className='bubble';
  var content=String(m.content||'');
  var codeRe=/```(\w*)\n?([\s\S]*?)```/g;
  var codeBlocks=[];
  var processed=content.replace(codeRe,function(match,lang,code){
    var idx=codeBlocks.length;codeBlocks.push({lang:lang||'',code:code.trim()});return '%%CB_'+idx+'%%';
  });
  var parts=processed.split(/(%%CB_\d+%%)/);
  parts.forEach(function(part){
    var cm=part.match(/%%CB_(\d+)%%/);
    if(cm){
      var cb=codeBlocks[parseInt(cm[1])];
      var wrap2=document.createElement('div');wrap2.className='code-block-wrap';
      var pre=document.createElement('pre');
      var codeEl=document.createElement('code');
      codeEl.className=cb.lang?'language-'+cb.lang:'';
      codeEl.textContent=cb.code;
      pre.appendChild(codeEl);wrap2.appendChild(pre);
      var btns=document.createElement('div');btns.className='code-btns';
      btns.innerHTML='<button class="cbtn" onclick="copyCode(this)"><svg viewBox="0 0 24 24" width="11" height="11" stroke="currentColor" fill="none" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>Copy</button>';
      wrap2.appendChild(btns);
      try{hljs.highlightElement(codeEl);}catch(err){}
      bubble.appendChild(wrap2);
    }else if(part.trim()){
      var div=document.createElement('div');div.innerHTML=safeMarked(part);bubble.appendChild(div);
    }
  });
  if(m.injected&&m.injected.length){
    var card=document.createElement('div');card.className='studio-inject-card';
    card.innerHTML='<div class="sc-title"><svg viewBox="0 0 24 24" width="11" height="11" stroke="currentColor" fill="none" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>INJECTED TO STUDIO</div>'+
      m.injected.map(function(it){return '<div class="sc-item">'+esc(it)+'</div>';}).join('');
    bubble.appendChild(card);
  }
  mbWrap.appendChild(bubble);
  if(!isUser){
    var acts=document.createElement('div');acts.className='msg-acts';
    acts.innerHTML=
      '<button class="mab" onclick="copyMsgText(this)" title="Copy"><svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg></button>'+
      '<button class="mab" onclick="retrySend(this)" title="Retry"><svg viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg></button>';
    mbWrap.appendChild(acts);
  }
  wrap.appendChild(mbWrap);
  container.appendChild(wrap);
  if(!skipScroll)container.scrollTop=container.scrollHeight;
}

// ─── INJECT (reuse from chats logic) ────────────────────────────────────────
function parseLuaBlocks(text){
  var blocks=[];
  var re=/```(?:lua|luau)\s*([\s\S]*?)```/g,m;
  while((m=re.exec(text))!==null){var code=m[1].trim();if(code.length<10)continue;if(/^\s*[\[{]/.test(code)&&/"action"\s*:/.test(code))continue;blocks.push(code);}
  return blocks;
}
function parseJsonBlocks(text){
  var cmds=[];
  var re=/```json\s*([\s\S]*?)```/g,m;
  while((m=re.exec(text))!==null){try{var parsed=JSON.parse(m[1].trim());var items=Array.isArray(parsed)?parsed:[parsed];items.forEach(function(item){if(item&&item.action)cmds.push(item);});}catch(e){}}
  return cmds;
}
function detectScriptParent(code){
  if(/DataStoreService|PlayerAdded|PlayerRemoving|OnServerEvent/.test(code))return{parent:'ServerScriptService',type:'Script'};
  if(/Players\.LocalPlayer|PlayerGui|StarterPlayerScripts|UserInputService/.test(code))return{parent:'StarterGui',type:'LocalScript'};
  if(/^\s*local\s+\w+\s*=\s*\{\}|return\s+\{/.test(code))return{parent:'ReplicatedStorage',type:'ModuleScript'};
  return{parent:'ServerScriptService',type:'Script'};
}
function makeScriptName(prompt,index,code){
  if(code){var nm=code.match(/--\s*name:\s*([\w_]+)/i);if(nm&&nm[1]&&nm[1].length>2)return nm[1];}
  var lower=(prompt||'').toLowerCase();
  var kw=[['loading','LoadingScreen_Client'],['shop','ShopSystem_Server'],['leaderboard','Leaderboard_Server'],['admin','AdminSystem_Server'],['coin','CoinSystem_Server'],['datastore','DataStore_Module'],['gui','GUIScript_Client'],['npc','NPCBehavior_Server'],['weapon','WeaponSystem'],['tool','ToolHandler']];
  for(var i=0;i<kw.length;i++){if(lower.includes(kw[i][0]))return kw[i][1]+(index>0?'_'+(index+1):'');}
  return'AgentScript'+(index>0?'_'+(index+1):'');
}
async function autoInjectToStudio(aiResponse,userPrompt){
  if(!studioConnected)return null;
  var summary=[];
  var username=(SESSION?SESSION.user.username:'').toLowerCase();
  var jsonCmds=parseJsonBlocks(aiResponse);
  if(jsonCmds.length>0){
    try{
      var r=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({type:'batch_commands',commands:jsonCmds,_user:SESSION?SESSION.user.username:'web',_target_user:username,target:username})});
      if(r.ok){var rd=await r.json();if(rd.pushed>0){jsonCmds.forEach(function(cmd){if(cmd.action&&cmd.action!=='none')summary.push('+'+cmd.action+(cmd.name?': '+cmd.name:''));});}}
    }catch(e){}
  }
  var luaBlocks=parseLuaBlocks(aiResponse);
  for(var i=0;i<luaBlocks.length;i++){
    var code=luaBlocks[i];
    var info=detectScriptParent(code);
    var sName=makeScriptName(userPrompt,i,code);
    var tm=code.match(/--\s*script_type:\s*(\w+)/i);if(tm)info.type=tm[1];
    var pm=code.match(/--\s*parent:\s*([\w.]+)/i);if(pm)info.parent=pm[1];
    try{
      var r2=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({type:'inject_command',command:{action:'inject_script',name:sName,parent:info.parent,script_type:info.type,code:code},_user:SESSION?SESSION.user.username:'web',_target_user:username,target:username})});
      if(r2.ok){var rd2=await r2.json();if(rd2.status==='ok'||rd2.pushed>0)summary.push(info.type+': '+sName+' → '+info.parent);}
    }catch(e){}
    if(luaBlocks.length>1)await new Promise(function(res){setTimeout(res,300);});
  }
  return summary.length>0?summary:null;
}

// ─── SEND ────────────────────────────────────────────────────────────────────
async function send(){
  if(isGen)return;
  var inp=document.getElementById('inp');
  var txt=(inp?inp.value.trim():'');
  var atts=attachments.slice();
  if(!txt&&!atts.length)return;

  isGen=true;cancelCtrl=new AbortController();
  var sendBtn=document.getElementById('sendBtn');var cancelBtn=document.getElementById('cancelBtn');
  if(sendBtn)sendBtn.classList.add('hidden');if(cancelBtn)cancelBtn.classList.remove('hidden');
  if(inp)inp.value='';if(inp)inp.style.height='auto';

  // Hide quick actions after first message
  var qa=document.getElementById('quickActions');if(qa)qa.innerHTML='';

  var userMsg={role:'user',content:txt,time:Date.now()};
  if(atts.length)userMsg.attachments=atts;
  convMsgs.push(userMsg);
  appendMsg(userMsg);
  attachments=[];renderAttachRow();

  showTyping();

  var apiMsgs=convMsgs.slice(-20).map(function(m){
    var content=m.content||'';
    if(Array.isArray(m.content)){return{role:m.role==='user'?'user':'model',content:m.content};}
    return{role:m.role==='user'?'user':'model',content:String(content)};
  });
  // Replace last user msg with attachments if any
  var lastM={role:'user',content:txt};
  if(atts.length){
    var contentArr=[{type:'text',text:txt}];
    atts.forEach(function(a){if(a.type==='image')contentArr.push({type:'image',source:{type:'base64',media_type:a.mime,data:a.data}});});
    lastM.content=contentArr;
  }
  apiMsgs[apiMsgs.length-1]=lastM;

  var sysPrompt=buildAgentSysPrompt();
  var aiText='';
  try{
    var body={provider:curModel.prov||'gemini',model:curModel.id,messages:apiMsgs,system:sysPrompt,max_tokens:32768};
    var response=await fetch('/api/ai',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body),signal:cancelCtrl.signal});
    if(!response.ok){
      var errData=await response.json().catch(function(){return{};});
      throw new Error(errData.error||'API error '+response.status);
    }
    var rd=await response.json();
    aiText=rd.content||'';
  }catch(e){
    if(e.name==='AbortError'){isGen=false;cancelCtrl=null;if(sendBtn)sendBtn.classList.remove('hidden');if(cancelBtn)cancelBtn.classList.add('hidden');rmTyping();return;}
    aiText='**Error getting response**\n\n'+e.message+'\n\n💡 Try switching models or check your connection.';
  }
  rmTyping();

  var hasError=aiText&&(aiText.startsWith('**Error')||aiText.startsWith('**Gagal'));
  var injected=null;
  var displayText=aiText;

  if(studioConnected&&!hasError){
    injected=await autoInjectToStudio(aiText,txt);
    displayText=aiText.replace(/```json[\s\S]*?```/g,'').replace(/```lua[\s\S]*?```/g,'').trim();
    if(!displayText||displayText.length<10){
      displayText=curLang==='id'
        ?'✅ Selesai! Semua komponen telah dibuat dan dimasukkan ke Roblox Studio.'
        :'✅ Done! All components have been built and injected into Roblox Studio.';
    }
  }

  var aiMsg={role:'agent',content:displayText,time:Date.now()};
  if(injected)aiMsg.injected=injected;
  aiMsg._rawContent=aiText;
  convMsgs.push(aiMsg);
  appendMsg(aiMsg);

  isGen=false;cancelCtrl=null;
  if(sendBtn)sendBtn.classList.remove('hidden');if(cancelBtn)cancelBtn.classList.add('hidden');
}

// ─── WELCOME MESSAGE ─────────────────────────────────────────────────────────
async function sendWelcome(){
  var t=T();
  var dn=SESSION&&SESSION.user&&(SESSION.user.displayName||SESSION.user.username)||'Developer';
  var welcomeText=t.welcome.replace('{name}',dn);
  var aiMsg={role:'agent',content:welcomeText,time:Date.now()};
  convMsgs.push(aiMsg);
  appendMsg(aiMsg,false,'welcome-msg');
}

// ─── QUICK ACTIONS ────────────────────────────────────────────────────────────
function renderQuickActions(){
  var qa=document.getElementById('quickActions');if(!qa)return;
  var t=T();
  qa.innerHTML=t.quickActions.map(function(q){
    return '<button class="qa-btn" onclick="useQuickAction(\''+esc(q)+'\')">'+(curLang==='id'?'':'')+''+q+'</button>';
  }).join('');
}
function useQuickAction(q){
  var inp=document.getElementById('inp');if(inp){inp.value=q;inp.style.height='auto';inp.style.height=Math.min(inp.scrollHeight,130)+'px';}
  send();
}

// ─── RETRY ───────────────────────────────────────────────────────────────────
function retrySend(btn){
  var msgEl=btn.closest('.msg.agent');if(!msgEl)return;
  var msgs=document.querySelectorAll('.msg');
  var idx=Array.from(msgs).indexOf(msgEl);
  if(idx>0&&convMsgs[idx-1]&&convMsgs[idx-1].role==='user'){
    var inp=document.getElementById('inp');if(inp){inp.value=convMsgs[idx-1].content;send();}
  }
}

// ─── COPY ─────────────────────────────────────────────────────────────────────
function copyCode(btn){
  var pre=btn.closest('.code-block-wrap').querySelector('pre code');
  if(pre)navigator.clipboard.writeText(pre.textContent).then(function(){toast('Copied!');});
}
function copyMsgText(btn){
  var bubble=btn.closest('.mb-wrap').querySelector('.bubble');
  if(bubble)navigator.clipboard.writeText(bubble.innerText||bubble.textContent).then(function(){toast('Copied!');});
}

// ─── CLEAR ────────────────────────────────────────────────────────────────────
function clearConv(){
  if(!confirm(T().clearConfirm))return;
  convMsgs=[];
  var container=document.getElementById('msgs');if(container)container.innerHTML='';
  renderQuickActions();
  sendWelcome();
}

// ─── ATTACHMENTS ─────────────────────────────────────────────────────────────
function handleFile(e){
  var files=Array.from(e.target.files||[]);
  files.forEach(function(file){
    if(file.type.startsWith('image/')){
      var reader=new FileReader();reader.onload=function(ev){attachments.push({type:'image',name:file.name,mime:file.type,data:ev.target.result.split(',')[1]});renderAttachRow();};reader.readAsDataURL(file);
    }else{
      var reader=new FileReader();reader.onload=function(ev){attachments.push({type:'file',name:file.name,text:ev.target.result});renderAttachRow();};reader.readAsText(file);
    }
  });
  e.target.value='';
}
function renderAttachRow(){
  var row=document.getElementById('attachRow');if(!row)return;
  row.innerHTML=attachments.map(function(a,i){
    if(a.type==='image')return '<div class="attach-item"><img src="data:'+a.mime+';base64,'+a.data+'" alt=""><button class="attach-rm" onclick="removeAttach('+i+')">×</button></div>';
    return '<div class="attach-item"><div class="attach-file">📄 '+esc(a.name)+'</div><button class="attach-rm" onclick="removeAttach('+i+')">×</button></div>';
  }).join('');
}
function removeAttach(i){attachments.splice(i,1);renderAttachRow();}

// ─── MODEL UI ─────────────────────────────────────────────────────────────────
function updateModelUI(){
  var el=document.getElementById('inpMName');if(el)el.textContent=curModel.label||curModel.id;
  var badge=document.getElementById('inpMBadge');
  if(badge){badge.textContent=(curModel.cost||0)===0?'FREE':(curModel.cost||0)+' CR';badge.style.color=curModel.cost<=0?'var(--green)':curModel.cost<=1?'var(--cyan)':'var(--yellow)';}
  var icon=document.getElementById('inpMIcon');if(icon){icon.src=curModel.icon||'';icon.style.display=curModel.icon?'':'none';}
}
function toggleMDD(e){
  e.stopPropagation();
  var dd=document.getElementById('mDD');if(!dd)return;
  var html='';
  MODEL_LIST.forEach(function(m){
    if(m.grp){html+='<div class="mg">'+esc(m.grp)+'</div>';return;}
    var isAct=m.id===curModel.id;
    var cls='mo'+(isAct?' act':'');
    var badgeHtml='<span class="mb '+(m.cost<=0?'f':m.cost<=2?'s':'p')+'">'+(m.cost<=0?'FREE':m.cost+' CR')+'</span>';
    var iconHtml=m.icon?'<img src="'+m.icon+'" onerror="this.style.display=\'none\'" style="width:18px;height:18px;object-fit:contain;border-radius:3px;">':'<div style="width:18px;height:18px;border-radius:3px;background:rgba(255,149,0,.1);display:flex;align-items:center;justify-content:center;font-size:9px;">AI</div>';
    html+='<div class="'+cls+'" onclick="selModel(\''+m.id+'\')"><div class="mo-icon">'+iconHtml+'</div><div><div class="mo-n">'+esc(m.label||m.id)+'</div><div class="mo-s">'+esc(m.prov||'')+'</div></div>'+badgeHtml+'</div>';
  });
  dd.innerHTML=html;
  var btn=document.getElementById('inpModelBtn');
  if(btn){var rect=btn.getBoundingClientRect();dd.style.bottom=(window.innerHeight-rect.top+4)+'px';dd.style.left=rect.left+'px';dd.style.right='auto';}
  dd.classList.toggle('open');
}
function selModel(id){
  var m=MODEL_LIST.find(function(x){return x.id===id;});if(!m||m.grp)return;
  curModel=m;updateModelUI();
  var dd=document.getElementById('mDD');if(dd)dd.classList.remove('open');
  toast('Model: '+m.label,'var(--orange)');
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
async function initAgent(){
  if(!SESSION)return;
  curLang=localStorage.getItem('nexus_lang')||'id';
  var t=T();

  // Update UI labels
  var backBtn=document.getElementById('backToNexusBtn');if(backBtn)backBtn.textContent=t.backBtn;
  var agentMode=document.getElementById('agentModeLabel');if(agentMode)agentMode.textContent=t.agentMode;
  var greetUser=document.getElementById('greetUser');if(greetUser)greetUser.textContent=t.greet+', @'+(SESSION.user.username||'Developer')+'!';
  var inpEl=document.getElementById('inp');if(inpEl)inpEl.placeholder=t.placeholder;

  updateModelUI();
  startStudioPoll();

  // Wait for studio check to complete before showing welcome
  await checkStudio();

  // Show quick actions
  renderQuickActions();

  // Show welcome message
  await sendWelcome();
}

// ─── EVENT LISTENERS ──────────────────────────────────────────────────────────
document.getElementById('inp').addEventListener('input',function(){
  this.style.height='auto';this.style.height=Math.min(this.scrollHeight,130)+'px';
});
document.getElementById('inp').addEventListener('keydown',function(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}
});
window.addEventListener('click',function(e){
  var mdd=document.getElementById('mDD');
  if(mdd&&!mdd.contains(e.target)&&document.getElementById('inpModelBtn')&&!document.getElementById('inpModelBtn').contains(e.target))mdd.classList.remove('open');
});

initAgent();
</script>
